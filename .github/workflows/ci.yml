name: CI

on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: homeatlas_test
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test

      - name: Run migrations
        run: npm run migrate --workspace=packages/db
        env:
          DATABASE_URL: postgresql://dev:dev@localhost:5432/homeatlas_test

    env:
      DATABASE_URL: postgresql://dev:dev@localhost:5432/homeatlas_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test